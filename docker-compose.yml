version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gramaai-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/gramaai
      - JWT_SECRET=dev-jwt-secret-change-in-production
      - JWT_REFRESH_SECRET=dev-refresh-secret-change-in-production
      - ACCESS_TOKEN_EXPIRY=15m
      - REFRESH_TOKEN_EXPIRY=7d
      - AI_ENGINE_URL=http://ai-engine:8000
      - FRONTEND_URL=http://localhost:5173
      - BCRYPT_ROUNDS=12
    depends_on:
      - mongo
      - ai-engine
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gramaai-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:5000/api
      - VITE_APP_NAME=GramaAI Lite
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: gramaai-ai-engine
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=./models/tfidf_model.pkl
      - DATA_PATH=./data
    volumes:
      - ./ai-engine:/app
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: gramaai-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

volumes:
  mongo-data:
